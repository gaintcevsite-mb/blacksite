<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - PayForge Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            background: #0B0E14;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .auth-container {
            background: rgba(15, 18, 25, 0.85);
            border: 1px solid rgba(255,255,255,0.08);
            backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: var(--radius);
            width: 100%;
            max-width: 420px;
            box-shadow: 0 12px 60px rgba(0,0,0,0.5);
        }
        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .auth-header h1 {
            color: #FFFFFF;
            font-size: 32px;
            margin-bottom: 8px;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
        }
        .auth-header p {
            color: rgba(255,255,255,0.5);
            font-size: 15px;
        }
        .input-group {
            margin-bottom: 20px;
        }
        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
            color: rgba(255,255,255,0.7);
        }
        .input-group input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: var(--radius-sm);
            color: #FFFFFF;
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            transition: var(--transition);
            box-sizing: border-box;
        }
        .input-group input::placeholder {
            color: rgba(255,255,255,0.3);
        }
        .input-group input:focus {
            outline: none;
            border-color: rgba(255,255,255,0.3);
            background: rgba(255,255,255,0.08);
            box-shadow: 0 0 0 4px rgba(255,255,255,0.04);
        }
        .btn-full {
            width: 100%;
            padding: 16px;
            background: #FFFFFF;
            color: #0B0E14;
            border: none;
            border-radius: var(--radius-sm);
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: var(--transition);
            font-family: 'Outfit', sans-serif;
            margin-top: 10px;
        }
        .btn-full:hover {
            background: #E2E8F0;
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(255,255,255,0.15);
        }
        .auth-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 14px;
            color: rgba(255,255,255,0.4);
        }
        .auth-footer a {
            color: #FFFFFF;
            font-weight: 600;
            text-decoration: none;
            transition: color 0.2s;
        }
        .auth-footer a:hover {
            color: rgba(255,255,255,0.7);
            text-decoration: underline;
        }
        #error-msg {
            background: rgba(211, 47, 47, 0.15);
            border: 1px solid rgba(211, 47, 47, 0.3);
            color: #FF6B6B;
            padding: 12px;
            border-radius: var(--radius-sm);
            font-size: 14px;
            text-align: center;
            margin-bottom: 20px;
            display: none;
        }
        .back-link {
            position: absolute;
            top: 30px;
            left: 30px;
            color: rgba(255,255,255,0.4);
            text-decoration: none;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: color 0.2s;
        }
        .back-link:hover { color: #FFFFFF; }
    </style>
</head>
<body>

<a href="index.html" class="back-link">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    Back to Home
</a>

<div class="auth-container fade-in">
    <div class="auth-header">
        <h1>Welcome Back</h1>
        <p>Login to your Partner Dashboard</p>
    </div>
    
    <div id="error-msg"></div>

    <form id="loginForm">
        <div class="input-group">
            <label>Email Address</label>
            <input type="email" id="email" required placeholder="name@company.com">
        </div>
        <div class="input-group">
            <label>Password</label>
            <input type="password" id="password" required placeholder="••••••••">
        </div>
        <button type="submit" class="btn-full">Sign In</button>
    </form>
    
    <div class="auth-footer">
        Don't have an account? <a href="register.html">Register here</a>
    </div>
</div>

<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = e.target.querySelector('button');
    btn.innerText = 'Signing in...';
    btn.disabled = true;

    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const errorMsg = document.getElementById('error-msg');
    
    try {
        const res = await fetch('/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        
        if (res.ok) {
            localStorage.setItem('auth_token', data.token);
            window.location.href = 'dashboard.html';
        } else {
            errorMsg.innerText = data.error || 'Login failed';
            errorMsg.style.display = 'block';
            btn.innerText = 'Sign In';
            btn.disabled = false;
        }
    } catch (err) {
        errorMsg.innerText = 'Server error. Please try again.';
        errorMsg.style.display = 'block';
        btn.innerText = 'Sign In';
        btn.disabled = false;
    }
});
</script>

</body>
</html>
