<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KYC Application - PayForge</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            background: var(--off-white);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
        }
        .auth-container {
            background: var(--white);
            border: 1px solid var(--border);
            padding: 40px;
            border-radius: var(--radius);
            width: 100%;
            max-width: 540px;
            box-shadow: var(--card-shadow);
        }
        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .auth-header h1 {
            color: var(--graphite);
            font-size: 30px;
            margin-bottom: 8px;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
        }
        .auth-header p {
            color: var(--graphite-muted);
            font-size: 15px;
        }
        .input-group {
            margin-bottom: 20px;
        }
        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
            color: var(--graphite);
        }
        .input-group input:not([type="file"]) {
            width: 100%;
            padding: 14px 16px;
            background: var(--off-white);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--graphite);
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            transition: var(--transition);
            box-sizing: border-box;
        }
        .input-group input:focus {
            outline: none;
            border-color: var(--deep-red);
            background: var(--white);
        }
        
        /* Phone Input with Dropdown */
        .phone-group {
            display: flex;
            gap: 10px;
        }
        .phone-select {
            padding: 14px 10px;
            background: var(--off-white);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--graphite);
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            outline: none;
            cursor: pointer;
            width: 130px;
            flex-shrink: 0;
            transition: var(--transition);
        }
        .phone-select:focus {
            border-color: var(--deep-red);
            background: var(--white);
        }

        /* Stylized File Uploads */
        .file-upload-box {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px 20px;
            border: 2px dashed var(--border);
            border-radius: var(--radius-sm);
            background: var(--off-white);
            cursor: pointer;
            transition: all var(--transition);
            overflow: hidden;
        }
        .file-upload-box input[type="file"] {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0;
            cursor: pointer;
        }
        .file-upload-box:hover {
            border-color: var(--deep-red);
            background: rgba(139, 26, 26, 0.03);
        }
        .file-upload-box svg {
            width: 32px; height: 32px;
            color: var(--deep-red);
            margin-bottom: 10px;
            opacity: 0.8;
        }
        .file-upload-text {
            font-size: 14px;
            color: var(--graphite);
            font-weight: 500;
            text-align: center;
        }
        .file-upload-subtext {
            font-size: 12px;
            color: var(--graphite-muted);
            margin-top: 5px;
        }
        .file-name {
            margin-top: 8px;
            font-size: 13px;
            color: var(--dark-emerald);
            font-weight: 600;
            display: none; /* hidden until selected */
            text-align: center;
        }

        .btn-full {
            width: 100%;
            padding: 16px;
            background: var(--deep-red);
            color: var(--white);
            border: none;
            border-radius: var(--radius-sm);
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: var(--transition);
            font-family: 'Outfit', sans-serif;
            margin-top: 10px;
        }
        .btn-full:hover {
            background: var(--deep-red-light);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(139, 26, 26, 0.2);
        }
        #success-msg {
            display: none;
            text-align: center;
            color: var(--dark-emerald);
            background: rgba(26, 92, 58, 0.1);
            padding: 15px;
            border-radius: var(--radius-sm);
            margin-bottom: 20px;
            font-weight: 500;
        }

        /* File upload success state */
        .file-upload-box.uploaded {
            border-color: var(--dark-emerald);
            background: rgba(26, 92, 58, 0.05);
        }
        .file-upload-box.uploaded svg {
            color: var(--dark-emerald);
        }

        /* Loading Overlay */
        .loading-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255,255,255,0.75);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 20px;
        }
        .loading-overlay.active {
            display: flex;
        }
        .spinner {
            width: 56px; height: 56px;
            border: 4px solid var(--border);
            border-top-color: var(--deep-red);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .loading-text {
            font-family: 'Outfit', sans-serif;
            font-size: 16px;
            font-weight: 600;
            color: var(--graphite);
        }
    </style>
</head>
<body>

<!-- Loading Overlay -->
<div class="loading-overlay" id="loading-overlay">
    <div class="spinner"></div>
    <div class="loading-text">Uploading documents...</div>
</div>

<div class="auth-container fade-in">
    <div class="auth-header">
        <h1>Partner KYC Verification</h1>
        <p>Complete your profile to access all platform features.</p>
    </div>
    
    <div id="success-msg">Application submitted successfully! Waiting for moderator approval. Redirecting...</div>

    <form id="kycForm">
        <div class="input-group">
            <label>Full Name</label>
            <input type="text" id="name" required>
        </div>
        <div class="input-group">
            <label>Date of Birth</label>
            <input type="date" id="dob" required>
        </div>
        <div class="input-group">
            <label>Address</label>
            <input type="text" id="address" required>
        </div>
        <div class="input-group">
            <label>National ID Card Number</label>
            <input type="text" id="id_card" required>
        </div>
        <div class="input-group">
            <label>Phone Number</label>
            <div class="phone-group">
                <select id="country_code" class="phone-select">
                    <!-- Options populated by JS -->
                </select>
                <input type="tel" id="phone_num" required placeholder="000-000-000">
            </div>
        </div>
        <div class="input-group">
            <label>E-mail Address</label>
            <input type="email" id="email" required>
        </div>
        <div class="input-group">
            <label>Telegram Username</label>
            <input type="text" id="telegram" required placeholder="@username">
        </div>

        <div class="input-group">
            <label>Picture of National ID</label>
            <div class="file-upload-box" id="id-box">
                <input type="file" id="id_photo" accept="image/*" required onchange="handleFileUpload(this, 'id-name', 'id-box')">
                <svg id="id-box-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
                <div class="file-upload-text" id="id-box-text">Click to upload ID photo</div>
                <div class="file-upload-subtext" id="id-box-sub">JPEG, PNG up to 10MB</div>
            </div>
            <div class="file-name" id="id-name"></div>
        </div>

        <div class="input-group">
            <label>Selfie with ID in hand</label>
            <div class="file-upload-box" id="selfie-box">
                <input type="file" id="selfie" accept="image/*" required onchange="handleFileUpload(this, 'selfie-name', 'selfie-box')">
                <svg id="selfie-box-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
                <div class="file-upload-text" id="selfie-box-text">Click to upload Selfie</div>
                <div class="file-upload-subtext" id="selfie-box-sub">Clear face, ID visible</div>
            </div>
            <div class="file-name" id="selfie-name"></div>
        </div>
        
        <button type="submit" class="btn-full" id="btn-submit">Submit Application</button>
        <div style="text-align:center; margin-top:15px; font-size:13px; color:var(--graphite-muted);">
            <a href="dashboard.html" style="color:var(--graphite-muted);">Skip for now</a>
        </div>
    </form>
</div>

<script>
// Handle file upload with visual feedback
function handleFileUpload(input, textId, boxId) {
    const el = document.getElementById(textId);
    const box = document.getElementById(boxId);
    const icon = document.getElementById(boxId + '-icon');
    const text = document.getElementById(boxId + '-text');
    const sub = document.getElementById(boxId + '-sub');
    if(input.files && input.files[0]) {
        el.textContent = input.files[0].name;
        el.style.display = 'block';
        // Update box to success state
        box.classList.add('uploaded');
        icon.innerHTML = '<path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/>';
        text.textContent = '✅ Image uploaded';
        sub.textContent = 'Click again to change';
    }
}

// Phone dropdown options
const countryCodes = [
    // Latin America
    { code: '+54', name: '🇦🇷 Argentina', iso: 'AR' },
    { code: '+506', name: '🇨🇷 Costa Rica', iso: 'CR' },
    { code: '+57', name: '🇨🇴 Colombia', iso: 'CO' },
    { code: '+593', name: '🇪🇨 Ecuador', iso: 'EC' },
    { code: '+503', name: '🇸🇻 El Salvador', iso: 'SV' },
    { code: '+502', name: '🇬🇹 Guatemala', iso: 'GT' },
    { code: '+504', name: '🇭🇳 Honduras', iso: 'HN' },
    { code: '+1876', name: '🇯🇲 Jamaica', iso: 'JM' },
    { code: '+52', name: '🇲🇽 Mexico', iso: 'MX' },
    { code: '+505', name: '🇳🇮 Nicaragua', iso: 'NI' },
    { code: '+507', name: '🇵🇦 Panama', iso: 'PA' },
    { code: '+595', name: '🇵🇾 Paraguay', iso: 'PY' },
    { code: '+51', name: '🇵🇪 Peru', iso: 'PE' },
    { code: '+1809', name: '🇩🇴 Dominican Rep.', iso: 'DO' },
    { code: '+598', name: '🇺🇾 Uruguay', iso: 'UY' },
    { code: '+56', name: '🇨🇱 Chile', iso: 'CL' },
    // Asia
    { code: '+880', name: '🇧🇩 Bangladesh', iso: 'BD' },
    { code: '+973', name: '🇧🇭 Bahrain', iso: 'BH' },
    { code: '+975', name: '🇧🇹 Bhutan', iso: 'BT' },
    { code: '+673', name: '🇧🇳 Brunei', iso: 'BN' },
    { code: '+855', name: '🇰🇭 Cambodia', iso: 'KH' },
    { code: '+91', name: '🇮🇳 India', iso: 'IN' },
    { code: '+856', name: '🇱🇦 Laos', iso: 'LA' },
    { code: '+95', name: '🇲🇲 Myanmar', iso: 'MM' },
    { code: '+977', name: '🇳🇵 Nepal', iso: 'NP' },
    { code: '+92', name: '🇵🇰 Pakistan', iso: 'PK' },
    { code: '+675', name: '🇵🇬 Papua New Guinea', iso: 'PG' },
    { code: '+94', name: '🇱🇰 Sri Lanka', iso: 'LK' },
    // Africa
    { code: '+213', name: '🇩🇿 Algeria', iso: 'DZ' },
    { code: '+20', name: '🇪🇬 Egypt', iso: 'EG' },
    { code: '+251', name: '🇪🇹 Ethiopia', iso: 'ET' },
    { code: '+224', name: '🇬🇳 Guinea', iso: 'GN' },
    { code: '+254', name: '🇰🇪 Kenya', iso: 'KE' },
    { code: '+223', name: '🇲🇱 Mali', iso: 'ML' },
    { code: '+221', name: '🇸🇳 Senegal', iso: 'SN' },
    { code: '+216', name: '🇹🇳 Tunisia', iso: 'TN' },
    // CIS & Europe
    { code: '+7', name: '🇷🇺 Russia', iso: 'RU' },
    { code: '+7', name: '🇰🇿 Kazakhstan', iso: 'KZ' },
    { code: '+34', name: '🇪🇸 Spain', iso: 'ES' },
    { code: '+44', name: '🇬🇧 United Kingdom', iso: 'GB' },
    // Middle East
    { code: '+971', name: '🇦🇪 UAE', iso: 'AE' },
    // North America
    { code: '+1', name: '🇺🇸 USA / Canada', iso: 'US' },
];

async function initPhoneCodes() {
    const selector = document.getElementById('country_code');
    countryCodes.forEach(c => {
        let opt = document.createElement('option');
        opt.value = c.code;
        opt.textContent = c.name + " (" + c.code + ")";
        opt.dataset.iso = c.iso;
        selector.appendChild(opt);
    });

    try {
        const res = await fetch('https://get.geojs.io/v1/ip/geo.json');
        if (res.ok) {
            const geo = await res.json();
            const matched = Array.from(selector.options).find(o => o.dataset.iso === geo.country_code);
            if (matched) {
                selector.value = matched.value;
            }
        }
    } catch(e) {}
}

initPhoneCodes();

// Compress image before upload (prevents 413 error from Nginx)
function compressImage(file, maxWidth, quality) {
    return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = new Image();
            img.onload = () => {
                const canvas = document.createElement('canvas');
                let w = img.width, h = img.height;
                if (w > maxWidth) { h = Math.round(h * maxWidth / w); w = maxWidth; }
                canvas.width = w; canvas.height = h;
                canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                canvas.toBlob((blob) => {
                    resolve(new File([blob], file.name, { type: 'image/jpeg' }));
                }, 'image/jpeg', quality);
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    });
}

document.getElementById('kycForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const token = localStorage.getItem('auth_token');
    if(!token) { window.location.href = 'login.html'; return; }
    
    // Show loading overlay
    document.getElementById('loading-overlay').classList.add('active');
    document.getElementById('btn-submit').disabled = true;
    
    const fullPhone = document.getElementById('country_code').value + document.getElementById('phone_num').value;

    // Compress photos to ~1MB max
    const idRaw = document.getElementById('id_photo').files[0];
    const selfieRaw = document.getElementById('selfie').files[0];
    const idCompressed = await compressImage(idRaw, 1600, 0.7);
    const selfieCompressed = await compressImage(selfieRaw, 1600, 0.7);

    // Get client IP and Geo
    let clientIp = 'unknown', clientGeo = 'unknown';
    try {
        const geoRes = await fetch('https://get.geojs.io/v1/ip/geo.json');
        if (geoRes.ok) {
            const geoData = await geoRes.json();
            clientIp = geoData.ip || 'unknown';
            clientGeo = (geoData.city || '') + ', ' + (geoData.region || '') + ', ' + (geoData.country || '');
        }
    } catch(e) {}

    const fd = new FormData();
    fd.append('name', document.getElementById('name').value);
    fd.append('dob', document.getElementById('dob').value);
    fd.append('address', document.getElementById('address').value);
    fd.append('id_card', document.getElementById('id_card').value);
    fd.append('phone', fullPhone);
    fd.append('email', document.getElementById('email').value);
    fd.append('telegram', document.getElementById('telegram').value);
    fd.append('client_ip', clientIp);
    fd.append('client_geo', clientGeo);
    fd.append('id_photo', idCompressed);
    fd.append('selfie', selfieCompressed);
    
    try {
        const res = await fetch('/api/kyc', {
            method: 'POST',
            headers: { 'Authorization': 'Bearer ' + token },
            body: fd
        });
        
        // Hide loading overlay
        document.getElementById('loading-overlay').classList.remove('active');
        
        if(res.ok) {
            document.getElementById('kycForm').style.display = 'none';
            document.getElementById('success-msg').style.display = 'block';
            setTimeout(() => { window.location.href = 'dashboard.html'; }, 3000);
        } else {
            alert("Upload failed. Try again.");
            document.getElementById('btn-submit').disabled = false;
        }
    } catch(err) {
            document.getElementById('loading-overlay').classList.remove('active');
            alert("Network error.");
            document.getElementById('btn-submit').disabled = false;
    }
});
</script>

</body>
</html>
